<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>


<style>
    body{
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:10px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
        width:100%;
        max-width:400px;
        text-align:center;
    }

    h2{
        margin-bottom:10px;
        color:#14532d;
    }

    p{
        color:#555;
        font-size:14px;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        border-radius:5px;
        border:1px solid #ccc;
        margin-bottom:15px;
    }

    button{
        width:100%;
        padding:12px;
        background:#14532d;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        font-size:15px;
    }

    button:hover{
        background:#0f3f23;
    }

    .footer{
        margin-top:20px;
        font-size:13px;
    }

    .footer a{
        text-decoration:none;
        color:#14532d;
        font-weight:bold;
    }
</style>


</head>
<body>

<div class="card">

<h2>🔐 Recuperar contraseña</h2>

<p>Ingresá tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

<form method="post">
    {% csrf_token %}

    {{ form.email }}

    <button type="submit">Enviar enlace</button>
</form>

<div class="footer">
    <a href="/login/">Volver al login</a>
</div>


</div>

</body>
</html>
