{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Subir comprobante</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
height:60px;
}

h2{
text-align:center;
color:#14532d;
margin-top:0;
}

.deuda-info{
background:#ecfdf5;
padding:15px;
border-radius:8px;
margin-bottom:20px;
border:1px solid #bbf7d0;
}

.deuda-info p{
margin:5px 0;
}

.monto{
font-size:22px;
font-weight:bold;
color:#14532d;
}

input[type=file]{
width:100%;
padding:10px;
margin-top:10px;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-subir{
background:#14532d;
color:white;
}

.btn-subir:hover{
background:#166534;
}

.btn-volver{
background:#6b7280;
color:white;
text-align:center;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
}

.btn-volver:hover{
background:#4b5563;
}

.preview-container{
    margin-top:20px;
    text-align:center;
    background:#f9fafb;
    padding:15px;
    border-radius:10px;
    border:1px solid #e5e7eb;
}

.preview-container p{
font-weight:bold;
color:#14532d;
}

#preview-img{
    max-width:100%;
    max-height:250px; /* 🔥 límite vertical */
    object-fit:contain;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#preview-pdf{
    width:100%;
    max-height:300px; /* 🔥 límite para PDF */
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

@media(max-width:480px){

    #preview-img{
        max-height:200px;
    }

    #preview-pdf{
        max-height:250px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
<img src="{% static 'img/PD_LOGO.png' %}">
</div>

<h2>Subir comprobante</h2>

<div class="deuda-info">

<p><b>Concepto:</b> {{ deuda.concepto }}</p>

<p class="monto">
Monto: ${{ deuda.monto }}
</p>

</div>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Seleccionar comprobante</label>

<input type="file" name="comprobante" id="archivo" required onchange="mostrarPreview(event)">
<div class="preview-container">

<p>Vista previa</p>

<img id="preview-img" style="display:none;">
<iframe id="preview-pdf" style="display:none; width:100%; height:300px;"></iframe>

</div>

<div class="buttons">

<button class="btn btn-subir" type="submit">
Subir comprobante
</button>

<a class="btn btn-volver" href="/mis-deudas/">
Volver
</a>

</div>

</form>

</div>

</div>

<script>

function mostrarPreview(event){

    var file = event.target.files[0];

    var previewImg = document.getElementById("preview-img");
    var previewPdf = document.getElementById("preview-pdf");

    var url = URL.createObjectURL(file);

    // Reset
    previewImg.style.display = "none";
    previewPdf.style.display = "none";

    if(file.type.includes("image")){
        previewImg.src = url;
        previewImg.style.display = "block";
    }else if(file.type === "application/pdf"){
        previewPdf.src = url;
        previewPdf.style.display = "block";
    }

}

</script>

</body>

</html>
