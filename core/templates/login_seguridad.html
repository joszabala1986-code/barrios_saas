{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguridad — Planta Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(160deg, #0c1f3f 0%, #1a3a6b 35%, #1e5fa8 65%, #2979c4 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -100px; right: -80px;
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 180px; left: -90px;
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* --- HERO --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 40px;
            position: relative;
            z-index: 2;
            animation: fadeDown 0.6s ease both;
        }

        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 88px;
            height: 88px;
            object-fit: contain;
            filter: drop-shadow(0 4px 18px rgba(0,0,0,0.35));
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .logo-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            margin-top: -6px;
        }

        /* --- SHEET --- */
        .login-sheet {
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 40px 32px 48px;
            position: relative;
            z-index: 2;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease both;
            animation-delay: 0.15s;
        }

        .sheet-handle {
            width: 40px; height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin: 0 auto 28px;
        }

        .sheet-title {
            font-size: 24px;
            font-weight: 800;
            color: #0c1f3f;
            text-align: center;
            margin-bottom: 4px;
        }

        .sheet-sub {
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 26px;
        }

        /* --- ERROR --- */
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }

        /* --- CAMPOS --- */
        .campo { margin-bottom: 14px; }

        .campo label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 6px;
        }

        .campo-inner { position: relative; }

        .campo-icono {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: #94a3b8;
            pointer-events: none;
        }

        .campo input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: all 0.3s;
        }

        .campo input::placeholder { color: #94a3b8; }

        .campo input:focus {
            border-color: #1e3a8a;
            background: white;
            box-shadow: 0 0 0 4px rgba(30,58,138,0.08);
        }

        /* --- BOTÓN --- */
        .btn-ingresar {
            width: 100%;
            padding: 15px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(30,58,138,0.35);
        }

        .btn-ingresar:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(30,58,138,0.4);
        }

        .btn-ingresar:active { transform: translateY(0); }

        /* --- VOLVER --- */
        .volver {
            margin-top: 22px;
            text-align: center;
            font-size: 13px;
        }

        .volver a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
        }

        .volver a:hover { text-decoration: underline; }

        /* --- ANIMACIONES --- */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- DESKTOP --- */
        @media (min-width: 480px) {
            body {
                justify-content: center;
                align-items: center;
                padding: 20px;
            }
            .hero { flex: none; padding: 40px 20px 30px; }
            .login-sheet {
                border-radius: 28px;
                width: 100%;
                max-width: 380px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            }
        }

        @media (max-height: 600px) {
            .hero { padding: 30px 20px 20px; }
            .logo-img { width: 60px; height: 60px; }
            .logo-text { font-size: 18px; }
            .login-sheet { padding: 24px 28px 32px; }
            .sheet-title { font-size: 20px; }
        }
    </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
    <div class="logo-wrapper">
        <img src="{% static 'img/PD_LOGO01.png' %}" class="logo-img" alt="Planta Digital">
        <div class="logo-text">Planta Digital</div>
        <div class="logo-sub">Panel de Seguridad</div>
    </div>
</div>

<!-- SHEET -->
<div class="login-sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">👮 Acceso Seguridad</h2>
    <p class="sheet-sub">Ingresá con tu DNI y contraseña</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="campo">
            <label>DNI</label>
            <div class="campo-inner">
                <span class="campo-icono">🪪</span>
                <input type="text" name="dni" placeholder="Número de DNI"
                       inputmode="numeric" required autofocus>
            </div>
        </div>

        <div class="campo">
            <label>Contraseña</label>
            <div class="campo-inner">
                <span class="campo-icono">🔒</span>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn-ingresar">Ingresar</button>
    </form>

    <p class="volver">
        <a href="{% url 'login' %}">← Volver a Planta Digital</a>
    </p>
</div>

</body>
</html>
