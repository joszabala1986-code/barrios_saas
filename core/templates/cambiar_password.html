<!DOCTYPE html>
<html>

<head>

<title>Cambiar contraseña</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.card{
background:white;
padding:30px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
background:#14532d;
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="card">

<h2>Cambiar contraseña</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Cambiar contraseña</button>

</form>

</div>

</body>

</html>
