<!DOCTYPE html>
<html>
<head>
    <title>Contrato del barrio - Planta Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px 20px;
        }

        .contrato-card {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #edf2f7;
        }

        .contrato-card h2 {
            color: #14532d;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .boton {
            display: inline-block;
            padding: 12px 24px;
            margin: 8px;
            background: #14532d;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .boton:hover {
            background: #166534;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(20,83,45,0.2);
        }

        .volver {
            background: #64748b;
        }

        .volver:hover {
            background: #475569;
            transform: translateY(-2px);
        }

        .mensaje {
            color: #dc2626;
            padding: 20px;
            background: #fef2f2;
            border-radius: 12px;
            margin: 15px 0;
        }

        .info-contrato {
            color: #666;
            font-size: 13px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 600px) {
            .contrato-card {
                padding: 24px;
            }
            .boton {
                display: block;
                margin: 10px auto;
            }
        }
    </style>
</head>

<body>

<div class="contrato-card">
    <h2>📄 Contrato del barrio</h2>
    <p class="subtitle">Reglamento interno y normativas</p>

    {% if url_contrato %}
        <a href="{{ url_contrato }}" target="_blank" class="boton">
            📖 Abrir contrato
        </a>
        <a href="{{ url_contrato }}" download class="boton">
            ⬇️ Descargar PDF
        </a>
        <p class="info-contrato">
            ⚠️ El enlace es temporal y expirará en 60 minutos.
        </p>
    {% else %}
        <div class="mensaje">
            ❌ No hay contrato disponible.<br>
            <small>El administrador del barrio aún no ha subido el contrato.</small>
        </div>
    {% endif %}

    <br>
    <a href="{% url 'mis_deudas' %}" class="boton volver">
        ← Volver a mis deudas
    </a>
</div>

</body>
</html>
